spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      host: localhost
      port: 6379
      channel:
        profile-view: profile_view_channel

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id:
        profile-pic: profile-pic-group
    topic:
      profile-pic:
        name: profile-pic-topic
        partition-count: 4

profile-pic:
  maxSize: 5242880
  largePhotoSize: 1080
  smallPhotoSize: 170
  folderName: user_profile_photos

services:
  s3:
    endpoint: http://localhost:${S3_PORT:9000}
    accessKey: ${S3_ACCESS_KEY:user}
    secretKey: ${S3_SECRET_KEY:password}
    region: bucket_region
    bucketName: userbucket

server:
  port: 8080

logging:
  level:
    root: info

project-service:
  host: localhost
  port: 8082

payment-service:
  host: localhost
  port: 9080

application:
  goals:
    max-active: 3