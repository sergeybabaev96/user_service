spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost

server:
  port: 8080

project-service:
  host: localhost
  port: 8082

payment-service:
  host: localhost
  port: 9080

springdoc:
  swagger-ui:
    path: /swagger-ui.html  # Кастомный путь к Swagger UI
    tags-sorter: alpha      # Сортировка тегов по алфавиту
    operations-sorter: alpha
    doc-expansion: none     # Сворачивание всех разделов по умолчанию
  api-docs:
    path: /v1/api-docs      # Путь к JSON-документации
  default-produces-media-type: application/json