spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      host: localhost
      port: 6379
      topics:
        - mentorship_request
        - mentorship_accepted

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

services:
  server:
    port: 8080

  logging:
    level:
      root: info

  project-service:
    host: localhost
    port: 8082

  payment-service:
    host: localhost
    port: 9080

  s3:
    endpoint: http://localhost:9000
    accessKey: user
    secretKey: password

avatar:
  bucket-name: avatars
  size-mb: 5
  big-side: 1080
  small-side: 170
