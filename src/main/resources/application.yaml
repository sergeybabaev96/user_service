spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost

  cloud:
    openfeign:
      client:
        config:
          payment-service:
            url: http://${payment-service.host}:${payment-service.port}
            connect-timeout: 3000
            read-timeout: 2000
  web:
    locale: en_US

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB


minio:
  s3:
    endpoint: http://localhost:9000
    region: us-east-1
    accessKey: user
    secretKey: password

dicebear:
  connectionTimeoutSeconds: 10
  readTimeoutSeconds: 10
  apiUrl: https://api.dicebear.com/9.x

avatar:
  bucketName: user-avatars
  customAvatars: custom-user-avatars
  maxImageSize: 5 * 1024 * 1024
  maxLargeImageSideSize: 1080
  maxSmallImageSideSize: 170

server:
  port: 8080

logging:
  level:
    root: info

project-service:
  host: localhost
  port: 8082

payment-service:
  host: localhost
  port: 9080

app:
  max-active-goals: 3
