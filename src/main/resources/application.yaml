spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channel:
        profile-view: profile_view
        follower: user_follow_channel
        recommendation-channel: recommendation_channel
        achievement-channel: achievement_channel
        follower-channel: follower_channel
        user-ban-channel: user_ban
        recommendation-mentorship-offered: recommendation_mentorship_offered
        mentorship-accepted-channel: mentorship_accepted_channel

  mvc:
    servlet:
      path: /api/v1

server:
  port: 8080

thread_pool:
  max_threads: 10

logging:
  level:
    root: info

project-service:
  host: localhost
  port: 8082

payment-service:
  host: localhost
  port: 9080

config:
  value:
    min.skill.offers: 3

