spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost

server:
  port: 8080

logging:
  level:
    root: info

project-service:
  host: localhost
  port: 8082

payment-service:
  host: localhost
  port: 9080

services:
  s3:
    endpoint: http://localhost:9000
    accessKey: user
    secretKey: password
    bucketName: corpbucket
    signingRegion: us-east-1

minio:
  image: minio/minio
  ports:
    - '9000:9000'
    - '9001:9001'
  volumes:
    - ~/minio/data:/data
  environment:
    - MINIO_ROOT_USER=user
    - MINIO_ROOT_PASSWORD=password
  command: server --console-address :9001 /data

createbuckets:
  image: minio/mc
  depends_on:
    - minio
  entrypoint: >
    /bin/sh -c "
    sleep 10;
    /usr/bin/mc config host minio http://minio:9000 user password;
    /usr/bin/mc mb minio/corpbucket;
    /usr/bin/mc anonymous set public minio/corpbucket;
    exit 0;
    "

