spring:
  profiles:
    active: dev # prod
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  data:
    redis:
      port: 6379
      host: localhost

  servlet:
    multipart:
      max-file-size: 5MB

server:
  port: 8080

project-service:
  host: localhost
  port: 8082

payment-service:
  host: localhost
  port: 9080

swagger:
  api-docs:
    path: /v1/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha

s3:
  endpoint: http://localhost:9000
  region: us-east-1
  accessKey: user
  secretKey: password
  download-path: /api/v1/buckets/corpbucket/objects/download?preview=true&prefix=
  bucketName: corpbucket

dicebear:
  apiUrl: https://api.dicebear.com/9.x
  connectionTimeoutSeconds: 10
  readTimeoutSeconds: 10
  token: YOUR_API_KEY

avatar:
  bucketName: user-avatars

goal:
  max-active-goals-per-user: 3

premium:
  removal:
    cron: "0 0 3 * * ?"  # Запуск каждый день в 03:00 (Quartz формат)
    batch-size: 100
    thread-pool-size: 4

image:
  avatar:
    folder-name: users_avatars
    sizes:
      large: 1080
      small: 170