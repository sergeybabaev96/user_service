spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  cloud:
    openfeign:
      client:
        config:
          paymentService:
            url: http://localhost:9080/payment/api

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost

server:
  port: 8080
  servlet:
    context-path: /users/api/v1

logging:
  level:
    root: info

services:
  s3:
    endpoint: http://localhost:9000
    accessKey: user
    secretKey: password
    bucketName: corpbucket


  project-service:
    host: localhost
    port: 8082

  payment-service:
    host: localhost
    port: 9080

premium:
  schedule:
    removal-cron: "0 0 0 * * SUN"
  batch:
    size: 1000

task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        keep-alive: 60s