spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channel:
        profile-view: profile_view_channel
        mentorship-request: MentorShipRequestTopic

      channel:
        recommendation-event: recommendation_event_channel

server:
  port: 8080

logging:
  level:
    root: info

project-service:
  host: localhost
  port: 8082

payment-service:
  host: localhost
  port: 9080

s3:
  endpoint: http://localhost:9000
  accessKey: user
  secretKey: password
  bucketName: corpbucket
  region: us-east-1
  isMocked: false
  otherBuckets:
    user-avatar-bucket

dicebear:
  initials-url: https://api.dicebear.com/9.x/initials/png

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
  api-docs:
    path: /v3/api-docs

  app:
    security:
      password-length: 10
      min-data-length: 6

thread-pool:
  delete-events-max-threads: 3

cron:
  delete-events: 0 30 18 * * THU
