name: Protect Dev Branch

on:
  pull_request_target:
    types: [ opened, reopened, synchronize, edited ]
    branches: [ "dev" ]

permissions:
  issues: write
  pull-requests: write

jobs:
  checkPR:
    runs-on: ubuntu-latest
    if: github.event.pull_request.base.ref == 'master'
    steps:
      - name: Fail if targeted at master
        run: |
          echo "PRs to the master branch are not allowed. Please change the target branch of your PR."
          exit 1

      - name: Notify User
        if: always()
        uses: actions/github-script@v5
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const issue_number = context.issue.number;
            const message = "⚠️ **ОШЫБКА**: Ты создал PR в dev ветку. PR-ы можно создавать только в ветку команды вида {имя_команды-master-stream<номер потока>}. Пожалуйста, нажми кнопку Edit вверху и измени ветку, в которую направляешь PR. После этого красная ошибка ниже должна пропасть, но этот комментарий останется - так и должно быть.";
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: message
            });