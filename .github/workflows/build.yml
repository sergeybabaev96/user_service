name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17.0.12'  # или 17.0.14, если обновишь локально

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: **Check Java and Gradle versions**
        run: |
          java -version
          gradle -v
