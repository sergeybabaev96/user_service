name: Check PRs

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

permissions:
  issues: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle.properties', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build with Gradle
        run: ./gradlew build testClasses -x test -x check -x jacocoTestReport -x jacocoTestCoverageVerification --no-daemon

      - name: Build and Test with Jacoco
        run : ./gradlew build test --no-daemon --continue

      - name: Check Jacoco Coverage
        run: ./gradlew build jacocoCoverageVerification --no-daemon --continue

      - name: Comment on Pull Request if build failed
        if: failure()
        uses: actions/github-script@v5
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const issue_number = context.issue.number;
            const message = "⚠️ Сборка не прошла. Пожалуйста проверьте тесты и их покрытие";
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: message
            });