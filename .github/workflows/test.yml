name: test
on:
  pull_request:
    branches:
      - murloc-master-stream9

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
       # Шаг 1: Получить код из репозитория
      - name:  Step 1 - Checkout code
        uses: actions/checkout@v4

      # Шаг 2: Установить Java (любой дистрибутив)
      - name:  Step 2 - Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Шаг 3: Кэширование зависимостей Gradle
      - name: Step 3 - Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle', '**/gradle.lockfile') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
          
      # Шаг 4: Изменить права доступа для скриптов (chmod)
      - name: Step 4 - Make script executable
        run: chmod +x gradlew

      # Шаг 5: Собрать проект и запустить тесты
      - name:  Step 5 - Build and test
        run: ./gradlew clean test