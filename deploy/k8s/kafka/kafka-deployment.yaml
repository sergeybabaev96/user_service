apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: user-service-namespace
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:4.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9092
              protocol: TCP
            - containerPort: 9093
              protocol: TCP
            - containerPort: 19092
              protocol: TCP
          env:
            - name: KAFKA_PROCESS_ROLES
              value: "controller,broker"
            - name: KAFKA_NODE_ID
              value: "0"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "0@kafka-0.kafka.user-service-namespace.svc.cluster.local:9093"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:19092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka-0.kafka.user-service-namespace.svc.cluster.local:9092,INTERNAL://kafka-0.kafka.user-service-namespace.svc.cluster.local:19092"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "INTERNAL"
            - name: SPRING_KAFKA_PROPERTIES_REQUEST_TIMEOUT_MS
              value: "600000"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    echo "Waiting for Kafka to start on port 9092..."
                    until timeout 2 bash -c "</dev/tcp/localhost/9092"; do
                      echo "Kafka is not available, waiting 5 seconds"
                      sleep 5
                    done
                    echo "Kafka is running, creating topics"
                    for T in premium-payment-response-topic premium-price-response-topic; do
                      /opt/kafka/bin/kafka-topics.sh \
                        --bootstrap-server localhost:9092 \
                        --create --if-not-exists \
                        --topic "$T" \
                        --partitions 3 \
                        --replication-factor 1 || \
                      echo "Topic $T exists or failed"
                    done
      volumes:
        - name: kafka-data
          emptyDir: { }
